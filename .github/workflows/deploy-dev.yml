name: Deploy Dev

on:
  workflow_run:
    workflows: ["CI Build (publish artifact)"]
    types: [completed]
    branches: [develop]

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: mixrec-api-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./package
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set App Service settings (dev)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "OpenAI__ApiKey", "value": "${{ secrets.OPENAI_API_KEY }}", "slotSetting": false },
              { "name": "OpenAI__Model",  "value": "gpt-4o-mini", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App (dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./package