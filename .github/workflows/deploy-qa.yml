# .github/workflows/deploy-qa.yml
name: Deploy QA (manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit reference: short SHA or full SHA"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: deploy-qa
  cancel-in-progress: true

env:
  # Must match the artifact name produced by CI (constant, no SHA)
  ARTIFACT_NAME: mixrec-api
  CI_WORKFLOW_FILE: ci-build.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Resolve full SHA
        id: sha
        shell: bash
        run: |
          in="${{ inputs.ref }}"
          api_url="https://api.github.com/repos/${{ github.repository }}/commits/${in}"
          full_sha=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url" | jq -r .sha)

          if [[ -z "$full_sha" || "$full_sha" == "null" ]]; then
            echo "Failed to resolve commit '$in' to a full SHA."
            exit 1
          fi

          echo "value=$full_sha" >> "$GITHUB_OUTPUT"

      - name: Find CI run id for this SHA (develop branch)
        id: cirun
        shell: bash
        run: |
          sha="${{ steps.sha.outputs.value }}"

          # Filter by head_sha server-side so the correct run is found regardless of how many
          # successful CI builds exist (the previous per_page=50 paging could miss it).
          runs_url="https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ env.CI_WORKFLOW_FILE }}/runs?head_sha=${sha}&status=success&per_page=20"
          run_id=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$runs_url" \
            | jq -r '.workflow_runs[0].id // empty')

          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "No successful CI run ($CI_WORKFLOW_FILE) found for SHA: $sha"
            echo "Make sure CI succeeded for that commit before deploying."
            exit 1
          fi

          echo "id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download artifact from CI run
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          run-id: ${{ steps.cirun.outputs.id }}
          path: ./package
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set App Service settings (qa)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "OpenAI__ApiKey",          "value": "${{ secrets.OPENAI_API_KEY }}",          "slotSetting": false },
              { "name": "Catalog__FlushSecret",     "value": "${{ secrets.CATALOG_FLUSH_SECRET }}",     "slotSetting": false }
            ]

      - name: Deploy to Azure Web App (qa)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./package