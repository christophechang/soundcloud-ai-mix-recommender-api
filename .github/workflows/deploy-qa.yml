name: Deploy QA (manual)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (artifact name is mixrec-api-<sha>)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Download artifact from CI run (by SHA)
        uses: actions/download-artifact@v4
        with:
          name: mixrec-api-${{ inputs.sha }}
          path: ./package
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set App Service settings (qa)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "OpenAI__ApiKey", "value": "${{ secrets.OPENAI_API_KEY }}", "slotSetting": false },
              { "name": "OpenAI__Model",  "value": "gpt-4o-mini", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App (qa)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./package