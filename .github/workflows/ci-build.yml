# .github/workflows/ci-build.yml
name: CI Build (publish artifact)

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: "soundcloud-ai-mix-recommender-api.sln"
  API_PROJECT: "Changsta.Ai.Interface.Api/Changsta.Ai.Interface.Api.csproj"
  TEST_PROJECT: "Changsta.Ai.Tests.Unit/Changsta.Ai.Tests.Unit.csproj"
  PUBLISH_DIR: "${{ github.workspace }}/publish"

jobs:
  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build --verbosity normal --logger "trx" --results-directory "${{ github.workspace }}/TestResults"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: warn

      - name: Publish
        if: success()
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output "${{ env.PUBLISH_DIR }}"

      # IMPORTANT: constant artifact name (no SHA). Deploy workflow uses run-id to fetch the correct one.
      - name: Upload API artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mixrec-api
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error
          retention-days: 14